<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement - Les Poutchou</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Paiement & Livraison</h1>

<!-- ÉTAPE 1 : INFORMATIONS CLIENT -->
<div class="step" id="step1">
  <h2>1. Informations de livraison</h2>

  <form id="form-info">
    <label>Nom complet</label>
    <input type="text" id="fullname" required>

    <label>Email</label>
    <input type="email" id="email" required>

    <label>Téléphone</label>
    <input type="tel" id="phone" required>

    <label>Adresse</label>
    <input type="text" id="address" required>

    <label>Ville</label>
    <input type="text" id="city" required>

    <label>Code postal</label>
    <input type="text" id="zipcode" required>

    <label>Pays</label>
    <input type="text" id="country" required>

    <button type="button" id="to-step2">Continuer</button>
  </form>
</div>

<!-- ÉTAPE 2 : RÉCAPITULATIF -->
<div class="step" id="step2" style="display:none;">
  <h2>2. Récapitulatif de la commande</h2>

  <div id="order-summary"></div>
  <p>Total : <span id="order-total"></span> €</p>

  <label class="rgpd">
    <input type="checkbox" id="rgpd" required>
    J’accepte la politique de confidentialité et les conditions de vente.
  </label>

  <button type="button" id="to-step3">Valider et continuer</button>
</div>

<!-- ÉTAPE 3 : PAIEMENT -->
<div class="step" id="step3" style="display:none;">
  <h2>3. Paiement</h2>

  <p>Choisis ton mode de paiement :</p>

  <button class="pay-btn" id="pay-card">Payer par carte</button>
  <button class="pay-btn" id="pay-paypal">PayPal</button>
  <button class="pay-btn" id="pay-stripe">Stripe</button>

  <p style="margin-top:20px;">(Intégration technique à faire ensuite)</p>
</div>

<script src="checkout.js"></script>

</body>
</html>
