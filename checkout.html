<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Paiement & Livraison - Poutchou</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="checkout-body">

  <div class="checkout-container">

    <!-- Barre de progression -->
    <div class="steps-progress">
      <div class="step-circle active" id="circle1">1</div>
      <div class="step-line"></div>
      <div class="step-circle" id="circle2">2</div>
      <div class="step-line"></div>
      <div class="step-circle" id="circle3">3</div>
    </div>

    <!-- ÉTAPE 1 : INFORMATIONS CLIENT -->
    <div class="step-card" id="step1">
      <h2>Informations de livraison</h2>

      <form id="form-info">
        <label>Nom complet</label>
        <input type="text" id="fullname" required>

        <label>Email</label>
        <input type="email" id="email" required>

        <label>Téléphone</label>
        <input type="tel" id="phone" required>

        <label>Adresse</label>
        <input type="text" id="address" required>

        <label>Ville</label>
        <input type="text" id="city" required>

        <label>Code postal</label>
        <input type="text" id="zipcode" required>

        <label>Pays</label>
        <input type="text" id="country" required>

        <button type="button" id="to-step2" class="btn-primary">Continuer</button>
      </form>
    </div>

    <!-- ÉTAPE 2 : RÉCAPITULATIF -->
    <div class="step-card" id="step2" style="display:none;">
      <h2>Récapitulatif de la commande</h2>

      <div id="order-summary" class="summary-list"></div>

      <div class="summary-total">
        Total : <span id="order-total"></span> €
      </div>

      <label class="rgpd">
        <input type="checkbox" id="rgpd">
        J’accepte la politique de confidentialité et les conditions de vente.
      </label>

      <button type="button" id="to-step3" class="btn-primary">Valider et continuer</button>
    </div>

    <!-- ÉTAPE 3 : PAIEMENT -->
    <div class="step-card" id="step3" style="display:none;">
      <h2>Paiement</h2>

      <p class="payment-text">Choisis ton mode de paiement :</p>

      <button class="btn-secondary" id="pay-card">Carte bancaire</button>
      <button class="btn-secondary" id="pay-paypal">PayPal</button>
      <button class="btn-secondary" id="pay-stripe">Stripe</button>

      <p class="payment-note">L’intégration technique sera ajoutée ensuite.</p>
    </div>

  </div>

  <script src="checkout.js"></script>

</body>
</html>
